<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="Wi-Fi HTTP API">
  <defs>
    <pattern id="g5" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#000000" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <radialGradient id="f5" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#F8F6F1" stop-opacity="0"/>
      <stop offset="70%" stop-color="#F8F6F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F8F6F1" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="220" fill="#F8F6F1"/>
  <rect width="1200" height="220" fill="url(#g5)"/>
  <rect width="1200" height="220" fill="url(#f5)"/>

  <g transform="translate(80, 40)">
    <rect width="156" height="26" rx="13" fill="#E8000A" fill-opacity="0.07" stroke="#E8000A" stroke-opacity="0.28"/>
    <text x="78" y="17.5" text-anchor="middle" fill="#E8000A" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2.2">05 · HTTP + MDNS</text>
  </g>

  <text x="80" y="142" fill="#0D0D0D" font-family="'Instrument Serif','Georgia',serif" font-size="72" letter-spacing="-2">Wi-Fi API<tspan fill="#E8000A">.</tspan></text>
  <text x="82" y="172" fill="#0D0D0D" fill-opacity="0.5" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="15" font-weight="300">A tiny HTTP server on the device. Advertised over mDNS as <tspan font-family="'Menlo','Consolas',monospace" fill="#E8000A">cerebro.local</tspan>.</text>

  <g transform="translate(1018, 110)">
    <path d="M -60 20 Q 0 -40 60 20" fill="none" stroke="#0D0D0D" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
    <path d="M -40 24 Q 0 -20 40 24" fill="none" stroke="#0D0D0D" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round"/>
    <path d="M -20 28 Q 0 4 20 28" fill="none" stroke="#0D0D0D" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="32" r="5" fill="#E8000A"/>
  </g>
</svg>
