  <text x="80" y="142" fill="#0D0D0D" font-family="'Instrument Serif','Georgia',serif" font-size="72" letter-spacing="-2">Hardware<tspan fill="#E8000A">.</tspan></text>
  <text x="82" y="172" fill="#0D0D0D" fill-opacity="0.5" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="15" font-weight="300">The board, the GPIO map, the peripherals — everything the firmware talks to.</text>

  <g transform="translate(900, 86)" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1.4">
