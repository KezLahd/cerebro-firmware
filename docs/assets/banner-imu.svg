  <text x="82" y="172" fill="#0D0D0D" fill-opacity="0.5" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="15" font-weight="300">A 6-axis IMU tells us which way is down. The framebuffer rotates to match.</text>

